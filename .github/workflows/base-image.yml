name: Build Base Image
on:
  push:
    branches: [main]
    paths:
      - 'mix.exs'
      - 'mix.lock'
      - 'config/config.exs'
      - 'config/prod.exs'
      - 'config/runtime.exs'
      - 'Dockerfile.base'
  workflow_dispatch:
jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.base
          push: true
          tags: ghcr.io/vianetmanagement/spectabas-base:latest
