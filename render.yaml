services:
  - type: web
    name: spectabas
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spectabas-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: PHX_HOST
        value: www.spectabas.com
      - key: PHX_SERVER
        value: "true"
      - key: PORT
        value: "4000"
      - key: CLICKHOUSE_URL
        sync: false
      - key: CLICKHOUSE_DB
        value: spectabas
      - key: CLICKHOUSE_WRITER_USER
        value: spectabas_writer
      - key: CLICKHOUSE_WRITER_PASSWORD
        sync: false
      - key: CLICKHOUSE_READER_USER
        value: spectabas_reader
      - key: CLICKHOUSE_READER_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: spectabas-db
    databaseName: spectabas
    user: spectabas
    plan: starter
